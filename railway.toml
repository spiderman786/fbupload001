[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm run start:production"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

# Default: one Railway service runs web + worker (queue, prefill, scheduler).
# If you use TWO services from this repo, override start commands in Railway:
#   Web service:    npm start
#   Worker service: npm run worker
# Mount the same volume (/app/data) on both if split.
